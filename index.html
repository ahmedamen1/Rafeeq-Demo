<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rafeeq — Graduation Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    font-family: 'Inter', system-ui, sans-serif;
    background: #0D1F3C;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 25% 50%, rgba(201,153,42,0.10) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 30%, rgba(27,95,166,0.12) 0%, transparent 50%);
    pointer-events: none;
  }

  .card {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    padding: 0 24px;
  }

  .name {
    font-size: clamp(48px, 12vw, 88px);
    font-weight: 900;
    letter-spacing: -0.04em;
    color: #ffffff;
    line-height: 1;
  }

  .name-ar {
    font-size: clamp(22px, 5vw, 38px);
    font-weight: 700;
    color: #C9992A;
    direction: rtl;
    margin-top: -12px;
  }

  .divider {
    width: 48px;
    height: 3px;
    background: linear-gradient(90deg, #C9992A, #E8B84B);
    border-radius: 2px;
  }

  .label {
    font-size: clamp(13px, 2.5vw, 16px);
    font-weight: 600;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.04em;
  }

  .coming {
    font-size: clamp(15px, 3vw, 20px);
    font-weight: 700;
    color: rgba(255,255,255,0.75);
  }

  .link {
    font-size: clamp(12px, 2vw, 15px);
    font-weight: 600;
    color: #C9992A;
    text-decoration: none;
    letter-spacing: 0.02em;
    border-bottom: 1px solid rgba(201,153,42,0.3);
    padding-bottom: 2px;
    transition: color 0.2s, border-color 0.2s;
  }
  .link:hover { color: #E8B84B; border-color: rgba(232,184,75,0.6); }
</style>
</head>
<body>
<div class="card">
  <div class="name">Rafeeq</div>
  <div class="name-ar">رفيق</div>
  <div class="divider"></div>
  <div class="label">Graduation Project &nbsp;·&nbsp; Zewail City of Science and Technology &nbsp;·&nbsp; 2025</div>
  <div class="coming">Demo coming soon</div>
  <a class="link" href="https://ahmedamen1.github.io/Rafeeq-Demo/">ahmedamen1.github.io/Rafeeq-Demo</a>
</div>
</body>
</html>
