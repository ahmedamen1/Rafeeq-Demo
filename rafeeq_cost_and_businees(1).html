<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D1F3C;--navy-d:#091529;--navy-m:#1A3155;--navy-p:#EEF2F8;
  --gold:#C9992A;--gold-l:#E8B84B;--gold-p:#FBF3E0;--gold-b:#DDB84A;
  --white:#FFFFFF;--bg:#F2F0EC;--s1:#FFFFFF;--s2:#F7F5F1;
  --bd:#DDD9D0;--bd2:#C5BFB4;
  --t1:#1A1612;--t2:#4A4540;--t3:#8B8680;
  --gr:#1A6B45;--gr-bg:#E4F5ED;--gr-bd:#A8D9C0;
  --am:#8B5E0A;--am-bg:#FDF5E3;--am-bd:#D9A840;
  --rd:#8B1F1F;--rd-bg:#FBE8E8;--rd-bd:#F0B4B4;
  --r:8px;--rl:12px;
}
body{background:var(--bg);font-family:'Inter',-apple-system,sans-serif;color:var(--t1);font-size:14px;line-height:1.5;min-height:100vh}

/* Header */
.hdr{background:var(--navy);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr-logo{display:flex;align-items:baseline;gap:10px}
.hdr-name{font-size:20px;font-weight:700;color:var(--gold);letter-spacing:.04em}
.hdr-sub{font-size:13px;color:rgba(255,255,255,.5);font-weight:400}
.hdr-pill{font-size:11px;background:rgba(201,153,42,.18);color:var(--gold-l);border:0.5px solid rgba(201,153,42,.35);padding:4px 12px;border-radius:20px;font-weight:500;white-space:nowrap}

/* Selector bar */
.sbar{background:var(--navy-d);padding:0 24px;display:flex;align-items:stretch;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,.07)}
.sbar-group{display:flex;align-items:center;border-right:1px solid rgba(255,255,255,.1);padding-right:12px;margin-right:12px;gap:0}
.sbar-group:last-child{border-right:none}
.sbar-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.35);white-space:nowrap;padding-right:8px}
.sbtn{background:none;border:none;color:rgba(255,255,255,.5);font-size:12.5px;font-family:inherit;padding:11px 13px;cursor:pointer;position:relative;white-space:nowrap;transition:color .15s}
.sbtn:hover{color:rgba(255,255,255,.8)}
.sbtn.on{color:var(--gold);font-weight:600}
.sbtn.on::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold)}
.sbtn.guide-btn.on{color:#7DD3FC}
.sbtn.guide-btn.on::after{background:#7DD3FC}

/* Main */
.main{max-width:980px;margin:0 auto;padding:20px 16px 48px}

/* Model intro */
.intro{background:var(--s1);border:0.5px solid var(--bd);border-left:3px solid var(--gold);border-radius:var(--rl);padding:16px 18px;margin-bottom:14px}
.intro-name{font-size:19px;font-weight:700;color:var(--navy);margin-bottom:2px}
.intro-sub{font-size:11px;color:var(--t3);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.intro-desc{font-size:13px;color:var(--t2);line-height:1.65}

/* Scenario note */
.sc-note{background:var(--navy-p);border:0.5px solid #C0CDE0;border-radius:var(--r);padding:9px 13px;margin-bottom:14px;font-size:12px;color:var(--navy-m);display:flex;gap:8px;line-height:1.55}

/* Cost bar */
.cbar-wrap{background:var(--s1);border:0.5px solid var(--bd);border-radius:var(--rl);padding:16px 18px;margin-bottom:14px}
.cbar-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:10px}
.cbar-track{height:38px;border-radius:6px;overflow:hidden;display:flex;margin-bottom:10px;background:var(--s2)}
.cbar-bom{background:var(--navy);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.85);font-size:11px;font-weight:600;overflow:hidden;white-space:nowrap;transition:width .45s}
.cbar-asm{background:var(--navy-m);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7);font-size:11px;font-weight:500;overflow:hidden;white-space:nowrap;transition:width .45s}
.cbar-mgn{background:var(--gold);display:flex;align-items:center;justify-content:center;color:#1a0e00;font-size:11px;font-weight:700;overflow:hidden;white-space:nowrap;flex:1;transition:width .45s}
.cbar-leg{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--t2)}
.cbar-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:5px;vertical-align:middle}

/* Metric cards */
.mcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:14px}
.mc{background:var(--s1);border:0.5px solid var(--bd);border-radius:var(--r);padding:12px 14px}
.mc.navy{background:var(--navy);border-color:var(--navy)}
.mc.gold{background:var(--gold-p);border-color:var(--gold-b)}
.mc.green{background:var(--gr-bg);border-color:var(--gr-bd)}
.mc-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:4px}
.mc.navy .mc-lbl{color:rgba(255,255,255,.45)}
.mc.gold .mc-lbl{color:var(--am)}
.mc.green .mc-lbl{color:var(--gr)}
.mc-val{font-size:18px;font-weight:700;color:var(--navy);line-height:1.2}
.mc.navy .mc-val{color:var(--gold)}
.mc.gold .mc-val{color:var(--am)}
.mc.green .mc-val{color:var(--gr)}
.mc-sub{font-size:11px;color:var(--t3);margin-top:3px}
.mc.navy .mc-sub{color:rgba(255,255,255,.35)}

/* Section heading */
.sec{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin:20px 0 8px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:0.5px;background:var(--bd)}

/* Tables */
.tbl-wrap{border:0.5px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:4px}
.bom-tbl{width:100%;border-collapse:collapse;font-size:13px;background:var(--s1)}
.bom-tbl th{background:var(--navy);color:rgba(255,255,255,.55);font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:8px 12px;text-align:left}
.bom-tbl th:nth-child(3),.bom-tbl th:last-child{text-align:right}
.bom-tbl td{padding:8px 12px;border-bottom:0.5px solid var(--bg);vertical-align:middle}
.bom-tbl .cat td{background:var(--s2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);padding:5px 12px}
.bom-tbl .sub-row td{background:var(--navy-p);font-weight:600;color:var(--navy);padding:9px 12px;border-top:1px solid #C0CDE0}
.bom-tbl .cogs-row td{background:var(--navy);color:white;font-weight:700;font-size:14px;padding:10px 12px}
.bom-tbl .retail-row td{background:var(--gold-p);color:var(--am);font-weight:700;font-size:14px;padding:10px 12px;border-top:1.5px solid var(--gold)}
.num{text-align:right;font-weight:600;white-space:nowrap}
.num2{text-align:right;color:var(--t3);font-size:12px;white-space:nowrap}
.src{font-size:10px;color:var(--t3);margin-top:1px;font-style:italic}
.b{display:inline-block;font-size:9.5px;font-weight:600;padding:1px 6px;border-radius:4px;margin-left:5px;vertical-align:middle;white-space:nowrap;border-width:0.5px;border-style:solid}
.b-cn{background:var(--am-bg);color:var(--am);border-color:var(--am-bd)}
.b-eg{background:var(--gr-bg);color:var(--gr);border-color:var(--gr-bd)}
.b-sv{background:var(--rd-bg);color:var(--rd);border-color:var(--rd-bd)}

/* Alpha competitive */
.cmp-box{background:var(--s1);border:0.5px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:4px}
.cmp-hdr{background:var(--gold-p);border-bottom:1px solid var(--gold-b);padding:11px 16px;font-size:12px;font-weight:600;color:var(--am);display:flex;align-items:center;gap:8px}
.cmp-body{padding:14px 16px}
.cmp-pos{font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:14px;padding:10px 12px;border-left:3px solid var(--gold);background:var(--gold-p);border-radius:0 var(--r) var(--r) 0}
.str-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px}
.str-card{border:0.5px solid var(--bd);border-radius:var(--r);padding:13px;border-top:2.5px solid var(--gold)}
.str-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-bottom:4px}
.str-ttl{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:5px}
.str-body{font-size:12px;color:var(--t2);line-height:1.6}
.str-impact{margin-top:8px;padding:5px 8px;background:var(--gr-bg);border-radius:4px;font-size:11px;color:var(--gr);font-weight:500}
.chi-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px}
.chi-tbl th{background:var(--s2);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);padding:6px 10px;text-align:left;border-bottom:1px solid var(--bd)}
.chi-tbl td{padding:8px 10px;border-bottom:0.5px solid var(--bg);vertical-align:top}
.chi-tbl .rfq-row td{background:var(--gold-p)}
.chi-tbl .rfq-row td:first-child{border-left:2px solid var(--gold)}

/* Feature/comp tables */
.feat-tbl{width:100%;border-collapse:collapse;font-size:13px;background:var(--s1);border-radius:var(--rl);overflow:hidden;border:0.5px solid var(--bd)}
.feat-tbl td{padding:8px 12px;border-bottom:0.5px solid var(--bg);vertical-align:top}
.feat-tbl td:first-child{font-size:12px;color:var(--t3);font-weight:500;width:36%}
.comp-wrap{overflow-x:auto;border-radius:var(--rl);border:0.5px solid var(--bd)}
.comp-tbl{width:100%;min-width:700px;border-collapse:collapse;font-size:12px;background:var(--s1)}
.comp-tbl th{background:var(--navy);color:rgba(255,255,255,.55);font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;text-align:left}
.comp-tbl td{padding:8px 10px;border-bottom:0.5px solid var(--bg);vertical-align:top;line-height:1.5}
.comp-tbl .rfq-row td{background:var(--gold-p)}
.comp-tbl .rfq-row td:first-child{border-left:2px solid var(--gold)}
.note-box{font-size:11px;color:var(--t3);line-height:1.65;padding:11px 14px;background:var(--s2);border-radius:var(--r);border:0.5px solid var(--bd);margin-top:14px}
.divider{border:none;border-top:0.5px solid var(--bd);margin:20px 0}

/* ═══ GUIDE STYLES ═══════════════════════════════════════════════════════ */
.guide-wrap{max-width:980px;margin:0 auto;padding:20px 16px 48px}

/* Scorecard */
.score-header{background:var(--navy);border-radius:var(--rl);padding:18px 20px;margin-bottom:20px;display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
.score-header-text h2{font-size:17px;font-weight:700;color:var(--gold);margin-bottom:4px}
.score-header-text p{font-size:13px;color:rgba(255,255,255,.6);line-height:1.55;max-width:560px}
.rag-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px}
.rag-item{display:flex;align-items:center;gap:5px;color:rgba(255,255,255,.5)}
.rag-dot{width:12px;height:12px;border-radius:50%}

.score-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px;margin-bottom:28px}
.score-card{background:var(--s1);border:0.5px solid var(--bd);border-radius:var(--rl);overflow:hidden}
.score-card-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--bd)}
.score-card-title{font-size:12px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.05em}
.rag-pill{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.04em}
.rag-g{background:var(--gr-bg);color:var(--gr);border:0.5px solid var(--gr-bd)}
.rag-a{background:var(--am-bg);color:var(--am);border:0.5px solid var(--am-bd)}
.rag-r{background:var(--rd-bg);color:var(--rd);border:0.5px solid var(--rd-bd)}
.score-rows{padding:0}
.score-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:0.5px solid var(--bg);gap:12px}
.score-row:last-child{border-bottom:none}
.score-row-label{font-size:12px;color:var(--t2);font-weight:500}
.score-row-val{font-size:13px;font-weight:700;color:var(--navy);text-align:right;white-space:nowrap}
.score-row-rag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.score-row-note{font-size:11px;color:var(--t3);padding:4px 16px 10px;background:var(--s2)}

.key-insight{background:var(--navy);border-radius:var(--rl);padding:16px 18px;margin-bottom:28px}
.key-insight h3{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.insight-item{display:flex;gap:10px;margin-bottom:8px;font-size:13px;color:rgba(255,255,255,.75);line-height:1.55}
.insight-item:last-child{margin-bottom:0}
.insight-num{font-size:16px;font-weight:700;color:var(--gold);flex-shrink:0;width:20px}

/* Glossary */
.gloss-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:10px}
.term-card{background:var(--s1);border:0.5px solid var(--bd);border-radius:var(--rl);overflow:hidden}
.term-head{background:var(--navy);padding:10px 14px;display:flex;align-items:baseline;gap:8px}
.term-name{font-size:13px;font-weight:700;color:var(--gold);letter-spacing:.01em}
.term-abbr{font-size:10px;color:rgba(255,255,255,.4);font-weight:400}
.term-body{padding:12px 14px}
.term-simple{font-size:13px;color:var(--t1);line-height:1.6;margin-bottom:8px;font-weight:500}
.term-example{font-size:12px;color:var(--t3);line-height:1.55;padding:8px 10px;background:var(--gold-p);border-radius:var(--r);border-left:2px solid var(--gold)}
.term-example strong{color:var(--am);font-weight:600}
.term-formula{font-size:11px;color:var(--navy-m);background:var(--navy-p);padding:5px 8px;border-radius:4px;font-family:monospace;margin-bottom:6px;display:block}

/* Standard thresholds box */
.thresholds{background:var(--s1);border:0.5px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:20px}
.thresholds-head{background:var(--navy);padding:12px 16px;font-size:12px;font-weight:700;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:.05em}
.thresh-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:0}
.thresh-item{padding:12px 16px;border-right:0.5px solid var(--bd);border-bottom:0.5px solid var(--bd)}
.thresh-item:last-child{border-right:none}
.thresh-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:4px}
.thresh-val{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:2px}
.thresh-note{font-size:11px;color:var(--t3)}

/* Responsive */
@media(max-width:580px){
  .hdr{padding:12px 14px}.sbar{padding:0 10px}
  .main,.guide-wrap{padding:12px 10px 36px}
  .mcards{grid-template-columns:repeat(2,1fr)}
  .str-grid,.score-grid,.gloss-grid{grid-template-columns:1fr}
  .thresh-grid{grid-template-columns:repeat(2,1fr)}
}
</style>

<!-- Header -->
<div class="hdr">
  <div class="hdr-logo">
    <span class="hdr-name">RAFEEQ</span>
    <span class="hdr-sub">SmartWheel</span>
  </div>
  <span class="hdr-pill">Cost &amp; Pricing Model · June 2026</span>
</div>

<!-- Selector bar -->
<div class="sbar">
  <div class="sbar-group">
    <span class="sbar-lbl">Scenario</span>
    <button class="sbtn" id="sc0" onclick="setSc(0)">🔧 Prototype<span style="opacity:.6;font-size:11px;margin-left:4px">(salvaged parts)</span></button>
    <button class="sbtn on" id="sc1" onclick="setSc(1)">🏭 Production<span style="opacity:.6;font-size:11px;margin-left:4px">(brand new)</span></button>
  </div>
  <div class="sbar-group">
    <span class="sbar-lbl">Model</span>
    <button class="sbtn on" id="m0" onclick="setM(0)">α Alpha</button>
    <button class="sbtn" id="m1" onclick="setM(1)">β Beta</button>
    <button class="sbtn" id="m2" onclick="setM(2)">γ Gamma ★</button>
  </div>
  <div class="sbar-group">
    <button class="sbtn guide-btn" id="gbtn" onclick="setGuide()">📚 Business Guide</button>
  </div>
</div>

<div id="out"></div>

<script>
/* ══ DATA ═══════════════════════════════════════════════════════════════ */
const V={motors:[6000,3100],ctrl:[0,3800],battery:[1120,2241],asmA:[0,2500],asmG:[0,3000]};
const VSRC={
  motors:['Salvaged from used hoverboard — 3,000 EGP/unit × 2','Alibaba 1,130 EGP/ea + ~37% import (shipping+customs 20%+VAT 14%) = ~1,550 EGP/ea landed'],
  ctrl:  ['Came with salvaged hoverboard (no separate cost)','AliExpress 2,221 EGP + 835 shipping + ~744 Egyptian customs/VAT'],
  battery:['1 pack only — 1,120 EGP (shorter run time)','2 packs × 1,120 EGP = 2,241 EGP from Amazon.eg — no import needed ✓'],
};
const S={mount:3000,ard:1200,jtk:750,est:60,sos:145,bz:25,wire:600,rail:2500,bucks:465,esp32:540,mlx:500,max:434,mpu:175,rpi5:14000,nvm:2000,lidar:8500,mic:450};
const RETAIL=[[20000,24000],[33000,40000],[70000,85000]];
const COMP_REF=[26750,80000,426000];
const COMP_LBL=['Generic Chinese electric chair (~26,750 EGP)','iHealth smart import (~80,000 EGP)','LUCI retrofit kit (USA ≈ 426,000 EGP)'];
const FIXED_COSTS=60000; // EGP/month

let curSc=1,curM=0,curMode='model';

function setSc(i){curSc=i;curMode='model';document.querySelectorAll('.sbtn[id^=sc]').forEach(b=>b.classList.remove('on'));document.getElementById('sc'+i).classList.add('on');document.getElementById('gbtn').classList.remove('on');render();}
function setM(i){curM=i;curMode='model';document.querySelectorAll('.sbtn[id^=m]').forEach(b=>b.classList.remove('on'));document.getElementById('m'+i).classList.add('on');document.getElementById('gbtn').classList.remove('on');render();}
function setGuide(){curMode='guide';document.querySelectorAll('.sbtn[id^=m],.sbtn[id^=sc]').forEach(b=>b.classList.remove('on'));document.getElementById('gbtn').classList.add('on');renderGuide();}

function computeBOM(model,sc){
  const drv=V.motors[sc]+V.ctrl[sc]+S.mount+V.battery[sc];
  const ctl=S.ard+S.jtk+S.est+S.sos+S.bz+S.wire;
  const pwr=S.rail+S.bucks;
  const hlth=model>=1?S.esp32+S.mlx+S.max+S.mpu:0;
  const nav=model>=2?S.rpi5+S.nvm+S.lidar+S.mic:0;
  const asm=model>=2?V.asmG[sc]:V.asmA[sc];
  const comp=drv+ctl+pwr+hlth+nav;
  return{drv,ctl,pwr,hlth,nav,asm,comp,cogs:comp+asm};
}
function fmt(n){return n.toLocaleString();}
function pct(n){return Math.round(n)+'%';}

/* ══ GUIDE RENDER ═══════════════════════════════════════════════════════ */
function renderGuide(){
  // compute key numbers for all models (production scenario)
  const BA=computeBOM(0,1),BB=computeBOM(1,1),BG=computeBOM(2,1);
  // production COGS
  const cogsA=BA.cogs,cogsB=BB.cogs,cogsG=BG.cogs;
  // retail mids
  const [rAl,rAh]=RETAIL[0],[rBl,rBh]=RETAIL[1],[rGl,rGh]=RETAIL[2];
  const rA=Math.round((rAl+rAh)/2),rB=Math.round((rBl+rBh)/2),rG=Math.round((rGl+rGh)/2);
  // margins
  const mA=Math.round((1-cogsA/rA)*100),mB=Math.round((1-cogsB/rB)*100),mG=Math.round((1-cogsG/rG)*100);
  // gross profit per unit
  const gpA=rA-cogsA,gpB=rB-cogsB,gpG=rG-cogsG;
  // break-even units/month
  const beA=Math.round(FIXED_COSTS/gpA*10)/10;
  const beB=Math.round(FIXED_COSTS/gpB*10)/10;
  const beG=Math.round(FIXED_COSTS/gpG*10)/10;
  // also compute Alpha with founder assembly (no labor)
  const cogsA_founder=BA.comp; // no assembly cost
  const mA_founder=Math.round((1-cogsA_founder/rA)*100);
  const gpA_founder=rA-cogsA_founder;
  const beA_founder=Math.round(FIXED_COSTS/gpA_founder*10)/10;

  function rag(val,good,warn){
    if(val>=good)return'rag-g';
    if(val>=warn)return'rag-a';
    return'rag-r';
  }
  function ragLbl(cls){return cls==='rag-g'?'✅ GOOD':cls==='rag-a'?'⚠️ CAUTION':'🔴 PROBLEM';}
  function beRag(be){return be<=4?'rag-g':be<=10?'rag-a':'rag-r';}

    <div class="term-card">

    <div class="term-card">
