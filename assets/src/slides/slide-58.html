<style>
#slide-58 { background: #0D1F3C; }
.qa53-chip { display:flex;flex-direction:column;align-items:center;gap:2px; }
.qa53-name { font-size:12px;font-weight:800;color:#0D1F3C;font-family:'Inter',sans-serif; }

</style>

<script>
(function(){
  'use strict';
  var _t58=[];
  function at(fn,ms){ _t58.push(setTimeout(fn,ms)); }
  function ca58(){ _t58.forEach(clearTimeout); _t58=[]; }
  function q(id){ return document.getElementById(id); }

  function hide58(){
    var els={
      'qa-left':  { opacity:'0', transform:'translateX(-24px)' },
      'qa-right': { opacity:'0', transform:'translateX(24px)' },
      'qa-main':  { opacity:'0', transform:'translateY(24px) scale(0.94)' },
      'qa-bar':   { width:'0' },
      'qa-qr':    { opacity:'0', transform:'translateY(20px) scale(0.92)' },
      'qa-link':  { opacity:'0' },
      'qa-desc':  { opacity:'0' },
      'qa-strip': { opacity:'0', transform:'translateY(32px)' }
    };
    Object.keys(els).forEach(function(id){
      var el=q(id); if(!el) return;
      el.style.transition='none';
      Object.keys(els[id]).forEach(function(p){ el.style[p]=els[id][p]; });
    });
  }

  function anim(id,delay,props,trans){
    at(function(){
      var el=q(id); if(!el) return;
      el.style.transition=trans||'opacity 0.65s ease,transform 0.65s cubic-bezier(0.16,1,0.3,1)';
      Object.keys(props).forEach(function(p){ el.style[p]=props[p]; });
    },delay);
  }

  window._slide58={
    enter: function(){
      ca58(); hide58();
      anim('qa-strip',80,{opacity:'1',transform:'translateY(0)'},'opacity 0.5s ease,transform 0.5s cubic-bezier(0.16,1,0.3,1)');
      // Left panel
      anim('qa-left', 120,{opacity:'1',transform:'translateX(0)'});
      anim('qa-main', 280,{opacity:'1',transform:'translateY(0) scale(1)'},'opacity 0.7s ease,transform 0.7s cubic-bezier(0.16,1,0.3,1)');
      at(function(){
        var el=q('qa-bar'); if(!el) return;
        el.style.transition='width 0.55s cubic-bezier(0.16,1,0.3,1)';
        el.style.width='60px';
      },600);
      // Right panel
      anim('qa-right',200,{opacity:'1',transform:'translateX(0)'});
      anim('qa-qr',   380,{opacity:'1',transform:'translateY(0) scale(1)'},'opacity 0.7s ease,transform 0.7s cubic-bezier(0.16,1,0.3,1)');
      anim('qa-link', 580,{opacity:'1'},'opacity 0.55s ease');
      anim('qa-desc', 720,{opacity:'1'},'opacity 0.5s ease');
    },
    leave: function(){ ca58(); hide58(); }
  };
})();
</script>
