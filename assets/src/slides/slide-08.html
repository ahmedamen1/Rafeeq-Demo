<script>
(function() {
  'use strict';
  var timers = [];
  var rafId = null;
  function at(fn, ms) { timers.push(setTimeout(fn, ms)); }
  function clearAll() {
    timers.forEach(clearTimeout); timers = [];
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  }
  function q(id) { return document.getElementById(id); }

  function formatNum(n) {
    if (n >= 1000000) return '1,000,000';
    return n.toLocaleString('en-US');
  }

  function countUp(targetEl, endVal, durationMs) {
    var start = null;
    function step(ts) {
      if (!start) start = ts;
      var p = Math.min((ts - start) / durationMs, 1);
      // ease out expo
      var eased = p === 1 ? 1 : 1 - Math.pow(2, -10 * p);
      var cur = Math.floor(eased * endVal);
      if (targetEl) targetEl.textContent = formatNum(cur);
      if (p < 1) rafId = requestAnimationFrame(step);
    }
    rafId = requestAnimationFrame(step);
  }

  function animateBar(el, targetPct, durationMs) {
    var start = null;
    function step(ts) {
      if (!start) start = ts;
      var p = Math.min((ts - start) / durationMs, 1);
      var eased = 1 - Math.pow(2, -10 * p);
      if (el) el.style.width = (eased * targetPct) + '%';
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function hide() {
    ['s4d-ts','s4d-badge'].forEach(function(id) {
      var el=q(id); if(el){el.style.transition='none';el.style.opacity='0';}
    });
    var eye=q('s4d-eye'); if(eye){eye.style.transition='none';eye.style.opacity='0';eye.style.transform='translateY(10px)';}
    var ctr=q('s4d-counter'); if(ctr){ctr.style.transition='none';ctr.style.opacity='0';ctr.style.transform='scale(0.92)';}
    var lbl=q('s4d-label'); if(lbl){lbl.style.transition='none';lbl.style.opacity='0';}
    var bw=q('s4d-bar-wrap'); if(bw){bw.style.transition='none';bw.style.opacity='0';}
    var bs=q('s4d-bar-served'); if(bs){bs.style.transition='none';bs.style.width='0';}
    var st=q('s4d-stats'); if(st){st.style.transition='none';st.style.opacity='0';st.style.transform='translateY(14px)';}
    var nm=q('s4d-num'); if(nm) nm.textContent='0';
  }

  function runSequence() {
    hide();

    // CCTV + badge
    at(function() {
      var t=q('s4d-ts'); if(t){t.style.transition='opacity 0.4s ease';t.style.opacity='1';}
      var b=q('s4d-badge'); if(b){b.style.transition='opacity 0.4s ease';b.style.opacity='1';}
    }, 100);

    // Eyebrow
    at(function() {
      var e=q('s4d-eye');
      if(e){e.style.transition='opacity 0.5s ease, transform 0.5s cubic-bezier(0.16,1,0.3,1)';e.style.opacity='1';e.style.transform='translateY(0)';}
    }, 250);

    // Counter appears + counts up
    at(function() {
      var c=q('s4d-counter');
      if(c){c.style.transition='opacity 0.5s ease, transform 0.6s cubic-bezier(0.16,1,0.3,1)';c.style.opacity='1';c.style.transform='scale(1)';}
      var lbl=q('s4d-label');
      if(lbl){lbl.style.transition='opacity 0.5s ease';lbl.style.opacity='1';}
      countUp(q('s4d-num'), 1000000, 2400);
    }, 450);

    // Bar appears + fills
    at(function() {
      var bw=q('s4d-bar-wrap');
      if(bw){bw.style.transition='opacity 0.5s ease';bw.style.opacity='1';}
      // 0.65% of 100% bar width = tiny gold sliver
      animateBar(q('s4d-bar-served'), 0.65, 1800);
    }, 1600);

    // Stats
    at(function() {
      var s=q('s4d-stats');
      if(s){s.style.transition='opacity 0.6s ease, transform 0.6s cubic-bezier(0.16,1,0.3,1)';s.style.opacity='1';s.style.transform='translateY(0)';}
    }, 2200);
  }

  window._slide08 = {
    enter: function() { clearAll(); runSequence(); },
    leave: function() { clearAll(); hide(); }
  };
})();
</script>
