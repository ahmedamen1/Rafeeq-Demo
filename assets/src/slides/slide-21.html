<script>
(function () {
  'use strict';
  var _t21 = [];
  function at(fn, ms) { _t21.push(setTimeout(fn, ms)); }
  function ca21() { _t21.forEach(clearTimeout); _t21 = []; }
  function q(id) { return document.getElementById(id); }

  function hide21() {
    var defs = {
      's18-ghost':    { opacity:'0', transform:'translateX(-20px)' },
      's18-eyebrow':  { opacity:'0' },
      's18-headline': { opacity:'0', transform:'translateY(20px)' },
      's18-bar':      { opacity:'1', width:'0' },
      's18-subtitle': { opacity:'0' },
      's18-pills':    { opacity:'0', transform:'translateY(14px)' }
    };
    Object.keys(defs).forEach(function(id) {
      var el = q(id); if (!el) return;
      el.style.transition = 'none';
      Object.keys(defs[id]).forEach(function(p) { el.style[p] = defs[id][p]; });
    });
  }

  function anim18(el, props, delay) {
    at(function() {
      if (!el) return;
      el.style.transition = 'opacity 0.55s ease, transform 0.55s cubic-bezier(0.16,1,0.3,1), width 0.5s cubic-bezier(0.16,1,0.3,1)';
      Object.keys(props).forEach(function(p) { el.style[p] = props[p]; });
    }, delay);
  }

  window._slide21 = {
    enter: function () {
      ca21(); hide21();
      anim18(q('s18-ghost'),    { opacity:'1', transform:'translateX(0)' }, 0);
      anim18(q('s18-eyebrow'),  { opacity:'1' }, 150);
      anim18(q('s18-headline'), { opacity:'1', transform:'translateY(0)' }, 250);
      anim18(q('s18-bar'),      { width:'80px' }, 500);
      anim18(q('s18-subtitle'), { opacity:'1' }, 600);
      anim18(q('s18-pills'),    { opacity:'1', transform:'translateY(0)' }, 750);
    },
    leave: function () { ca21(); hide21(); }
  };
})();
</script>
