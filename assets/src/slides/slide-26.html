<style>

</style>

<script>
(function(){
  'use strict';
  var timers=[];
  function at(fn,ms){ timers.push(setTimeout(fn,ms)); }
  function clearAll(){ timers.forEach(clearTimeout); timers=[]; }
  function q(id){ return document.getElementById(id); }

  function show(id,delay,tx,ty){
    at(function(){
      var el=q(id); if(!el)return;
      el.style.transition='opacity 0.55s ease,transform 0.55s cubic-bezier(0.16,1,0.3,1)';
      el.style.opacity='1'; el.style.transform='translate(0,0)';
    },delay);
  }

  function hide(){
    ['sp3-hdr','sp3-stat','sp3-grid','sp3-chart'].forEach(function(id){
      var el=q(id); if(!el)return;
      el.style.transition='none'; el.style.opacity='0';
      if(id==='sp3-hdr') el.style.transform='translateY(-16px)';
      else if(id==='sp3-chart') el.style.transform='translateX(24px)';
      else if(id==='sp3-stat') el.style.transform='translateY(20px)';
      else el.style.transform='translateY(16px)';
    });
    var ul=q('s22-uline'); if(ul){ul.style.transition='none';ul.style.width='0';}
  }

  function enter(){
    hide();
    at(function(){
      var h=q('sp3-hdr'); if(h){h.style.transition='opacity 0.5s ease,transform 0.5s cubic-bezier(0.16,1,0.3,1)';h.style.opacity='1';h.style.transform='translateY(0)';}
    },80);
    at(function(){
      var ul=q('s22-uline'); if(ul){ul.style.transition='width 0.5s cubic-bezier(0.16,1,0.3,1)';ul.style.width='56px';}
    },380);
    show('sp3-stat',200);
    show('sp3-grid',380);
    show('sp3-chart',300);
  }

  window._slide26={
    enter:enter,
    leave:function(){ clearAll(); hide(); }
  };
})();
</script>
