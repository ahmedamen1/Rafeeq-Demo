<style>
#slide-11 { background: #0D1F3C; overflow: hidden; }
.sp9t-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 60%, rgba(201,153,42,0.12) 0%, transparent 60%),

</style>
<script>
(function(){
  var timers=[];
  function at(fn,ms){timers.push(setTimeout(fn,ms));}
  function clearAll(){timers.forEach(clearTimeout);timers=[];}
  function q(sel){return document.querySelector(sel);}
  function hide(){
    ['sp9t-eyebrow','sp9t-title','sp9t-uline','sp9t-sub'].forEach(function(id){
      var el=q('#'+id);if(!el)return;
      el.style.transition='none';el.style.opacity='0';
      if(id==='sp9t-uline')el.style.width='0';
      else el.style.transform='translateY('+(id==='sp9t-title'?'30':'16')+'px)';
    });
  }
  window._slide11={
    enter:function(){
      hide();
      at(function(){var e=q('#sp9t-eyebrow');if(e){e.style.transition='opacity 0.5s ease,transform 0.5s cubic-bezier(0.16,1,0.3,1)';e.style.opacity='1';e.style.transform='translateY(0)';}},80);
      at(function(){var t=q('#sp9t-title');if(t){t.style.transition='opacity 0.6s ease,transform 0.6s cubic-bezier(0.16,1,0.3,1)';t.style.opacity='1';t.style.transform='translateY(0)';}},220);
      at(function(){var u=q('#sp9t-uline');if(u){u.style.transition='width 0.5s cubic-bezier(0.16,1,0.3,1)';u.style.width='80px';}},580);
      at(function(){var s=q('#sp9t-sub');if(s){s.style.transition='opacity 0.4s ease';s.style.opacity='1';}},700);
    },
    leave:function(){clearAll();hide();}
  };
})();
</script>
