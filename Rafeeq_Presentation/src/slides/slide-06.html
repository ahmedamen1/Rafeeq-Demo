<style>
#slide-5 { background: #080b10; }
</style>

<script>
(function() {
  'use strict';
  var timers = [];
  var rafId = null;
  function at(fn, ms) { timers.push(setTimeout(fn, ms)); }
  function clearAll() {
    timers.forEach(clearTimeout); timers = [];
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  }
  function q(id) { return document.getElementById(id); }

  var minDeg = 0;
  function spinClock() {
    minDeg += 1.8;
    var mg = q('s4b-min-group');
    if (mg) mg.style.transform = 'rotate(' + minDeg + 'deg)';
    rafId = requestAnimationFrame(spinClock);
  }

  function countTime() {
    var endSecs = 10800;
    var duration = 3200;
    var start = null;
    function step(ts) {
      if (!start) start = ts;
      var p = Math.min((ts - start) / duration, 1);
      var eased = 1 - Math.pow(2, -10 * p);
      var totalSecs = Math.floor(eased * endSecs);
      var hel = q('s4b-hrs'); if (hel) hel.textContent = Math.floor(totalSecs / 3600);
      var mel = q('s4b-min'); if (mel) mel.textContent = String(Math.floor((totalSecs % 3600) / 60)).padStart(2, '0');
      if (p < 1) rafId = requestAnimationFrame(step);
    }
    rafId = requestAnimationFrame(step);
  }

  function hide() {
    var vid = q('s4b-video');
    if (vid) { vid.style.transition='none'; vid.style.opacity='0'; vid.pause(); vid.currentTime=0; }
    ['s4b-ts','s4b-badge'].forEach(function(id) {
      var el=q(id); if(el){el.style.transition='none';el.style.opacity='0';}
    });
    var clk=q('s4b-clock'); if(clk){clk.style.transition='none';clk.style.opacity='0';clk.style.transform='translateY(16px)';}
    var cnt=q('s4b-counter'); if(cnt){cnt.style.transition='none';cnt.style.opacity='0';cnt.style.transform='translateY(12px)';}
    var rule=q('s4b-rule'); if(rule){rule.style.transition='none';rule.style.width='0';}
    var cap=q('s4b-caption'); if(cap){cap.style.transition='none';cap.style.opacity='0';cap.style.transform='translateY(12px)';}
    var hel=q('s4b-hrs'); if(hel) hel.textContent='0';
    var mel=q('s4b-min'); if(mel) mel.textContent='00';
    minDeg = 0;
  }

  function runSequence() {
    // Video
    at(function() {
      var vid=q('s4b-video');
      if(vid){vid.currentTime=0;vid.play().catch(function(){});vid.style.transition='opacity 1s ease';vid.style.opacity='1';}
    }, 0);
    // CCTV + badge
    at(function() {
      var t=q('s4b-ts'); if(t){t.style.transition='opacity 0.4s ease';t.style.opacity='1';}
      var b=q('s4b-badge'); if(b){b.style.transition='opacity 0.4s ease';b.style.opacity='1';}
    }, 200);
    // Clock
    at(function() {
      var el=q('s4b-clock');
      if(el){el.style.transition='opacity 0.7s ease, transform 0.7s cubic-bezier(0.16,1,0.3,1)';el.style.opacity='1';el.style.transform='translateY(0)';}
      spinClock();
    }, 350);
    // Counter
    at(function() {
      var cnt=q('s4b-counter');
      if(cnt){cnt.style.transition='opacity 0.6s ease, transform 0.6s cubic-bezier(0.16,1,0.3,1)';cnt.style.opacity='1';cnt.style.transform='translateY(0)';}
      countTime();
    }, 650);
    // Rule
    at(function() {
      var rule=q('s4b-rule');
      if(rule){rule.style.transition='width 0.5s cubic-bezier(0.16,1,0.3,1)';rule.style.width='48px';}
    }, 950);
    // Caption
    at(function() {
      var cap=q('s4b-caption');
      if(cap){cap.style.transition='opacity 0.6s ease, transform 0.6s cubic-bezier(0.16,1,0.3,1)';cap.style.opacity='1';cap.style.transform='translateY(0)';}
    }, 1050);
  }

  window._slide06 = {
    enter: function() { hide(); runSequence(); },
    leave: function() { clearAll(); hide(); }
  };
})();
</script>
